<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WiFi Billing Admin Dashboard — Manage customers, billing, collectors, and WiFi plans">
  <!-- Preconnect to CDNs for faster loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <!-- Material Icons — loaded eagerly with font-display: block to prevent text flash natively -->
  <link rel="preload" href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined&display=block" as="style">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined&display=block">
  <title>WiFi Billing — Admin Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%233b82f6'/%3E%3Cpath d='M50 72a6 6 0 1 0 0-12 6 6 0 0 0 0 12zm-16.5-18.5a23.4 23.4 0 0 1 33 0' stroke='white' stroke-width='6' stroke-linecap='round' fill='none'/%3E%3Cpath d='M25 44a35.4 35.4 0 0 1 50 0' stroke='white' stroke-width='6' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">
  <!-- Leaflet for location picker (deferred — not needed at initial load) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" media="print" onload="this.media='all'" />
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <div id="app">
    <!-- App renders here -->
    <div style="display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:Inter,sans-serif; color:#94a3b8; background:#0a0e1a;">
      <div style="display:flex; flex-direction:column; align-items:center; position:relative; top:-10px;">
        <div class="wifi-loader" style="margin-bottom:25px;">
            <div></div><div></div><div></div>
        </div>
        <div style="font-weight:600; letter-spacing:0.05em; font-size:14px;">Loading WiFi Billing...</div>
      </div>
    </div>
    <style>
      @keyframes wifiPulse {
        0% { transform: scale(0.5); opacity: 0; }
        50% { opacity: 1; }
        100% { transform: scale(1.5); opacity: 0; }
      }
      .wifi-loader { position: relative; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; }
      .wifi-loader div { position: absolute; border: 3px solid transparent; border-top-color: #00D9FF; border-radius: 50%; animation: wifiPulse 1.5s linear infinite; }
      .wifi-loader div:nth-child(1) { width: 60px; height: 60px; animation-delay: 0.0s; }
      .wifi-loader div:nth-child(2) { width: 40px; height: 40px; animation-delay: 0.15s; border-top-color: #00A3FF; }
      .wifi-loader div:nth-child(3) { width: 20px; height: 20px; animation-delay: 0.3s; border-top-color: #3b82f6; border: 3px solid #3b82f6; }
    </style>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
