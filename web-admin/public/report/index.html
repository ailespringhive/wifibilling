<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repair Tickets — WiFi Billing</title>
  <meta name="description" content="View and submit repair tickets. No login required.">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page:         #080c18;
      --bg-card:         #0f1428;
      --bg-card-hover:   #131932;
      --bg-input:        rgba(255,255,255,0.05);
      --bg-input-focus:  rgba(59,130,246,0.08);
      --border:          rgba(255,255,255,0.09);
      --border-focus:    rgba(59,130,246,0.6);
      --text-primary:    #f1f5f9;
      --text-secondary:  #94a3b8;
      --text-muted:      #64748b;
      --accent-blue:     #3b82f6;
      --accent-indigo:   #6366f1;
      --accent-emerald:  #10b981;
      --accent-amber:    #f59e0b;
      --accent-rose:     #f43f5e;
      --radius-md:  12px;
      --radius-lg:  18px;
      --radius-xl:  24px;
      --sidebar-w:  220px;
    }

    html, body { min-height: 100vh; background: var(--bg-page); font-family: 'Inter', sans-serif; color: var(--text-primary); -webkit-font-smoothing: antialiased; }

    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 70% 40% at 15% 0%, rgba(59,130,246,.18) 0%, transparent 55%),
        radial-gradient(ellipse 50% 35% at 85% 100%, rgba(99,102,241,.14) 0%, transparent 55%);
    }

    /* ── Layout ── */
    .layout { display: block; min-height: 100vh; position: relative; z-index: 1; }

    /* ── Topbar ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px;
      height: 60px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,12,24,.7);
      backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 50;
    }

    .topbar-title { font-family: 'Outfit', sans-serif; font-size: 1.15rem; font-weight: 700; }

    .topbar-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(59,130,246,.12);
      border: 1px solid rgba(59,130,246,.3);
      color: var(--accent-blue);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.78rem; font-weight: 600;
    }

    .topbar-badge .material-icons-outlined { font-size: 14px; }

    /* ── Page body ── */
    .page-body { padding: 24px 28px; flex: 1; }

    /* ── Card ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .card-title { font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 700; }

    .card-actions { display: flex; gap: 10px; align-items: center; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 16px;
      border-radius: var(--radius-md);
      font-family: 'Inter', sans-serif;
      font-size: 0.865rem; font-weight: 600;
      cursor: pointer; border: none;
      transition: all .2s ease;
    }

    .btn .material-icons-outlined { font-size: 17px; }

    .btn-primary {
      background: linear-gradient(135deg,var(--accent-blue),var(--accent-indigo));
      color: #fff;
      box-shadow: 0 2px 12px rgba(59,130,246,.3);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(59,130,246,.4); }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .btn-ghost:hover { background: rgba(255,255,255,.05); color: var(--text-primary); }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      padding: 11px 16px;
      text-align: left;
      font-size: 0.72rem; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg-card-hover); }

    tbody td {
      padding: 14px 16px;
      font-size: 0.875rem;
      vertical-align: middle;
    }

    .customer-name { font-weight: 600; }
    .customer-id   { font-size: .73rem; color: var(--text-muted); margin-top: 2px; }

    .issue-cell { max-width: 240px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px;
      font-size: .74rem; font-weight: 700;
    }

    .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    .badge-pending    { background: rgba(245,158,11,.12);  color: var(--accent-amber);   } .badge-pending::before    { background: var(--accent-amber); }
    .badge-progress   { background: rgba(59,130,246,.12);  color: var(--accent-blue);    } .badge-progress::before   { background: var(--accent-blue); }
    .badge-resolved   { background: rgba(16,185,129,.12);  color: var(--accent-emerald); } .badge-resolved::before   { background: var(--accent-emerald); }
    .badge-cancelled  { background: rgba(244,63,94,.1);    color: var(--accent-rose);    } .badge-cancelled::before  { background: var(--accent-rose); }

    .priority-high     { color: var(--accent-rose);    font-weight: 700; }
    .priority-medium   { color: var(--accent-amber);   font-weight: 700; }
    .priority-low      { color: var(--text-muted);     font-weight: 600; }
    .priority-critical { color: #ff2d55;               font-weight: 700; }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-icon  { font-size: 3rem; color: var(--text-muted); opacity: .4; margin-bottom: 14px; }
    .empty-title { font-size: 1rem; font-weight: 700; color: var(--text-secondary); }
    .empty-sub   { font-size: .83rem; color: var(--text-muted); margin-top: 6px; }

    /* ── Pagination ── */
    .pagination {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px;
      border-top: 1px solid var(--border);
      font-size: .83rem; color: var(--text-muted);
    }

    .btn-sm { padding: 7px 14px; font-size: .82rem; }

    /* ── Loading spinner ── */
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 48px auto; display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Modal overlay ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: none; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: var(--radius-xl);
      width: 100%; max-width: 500px;
      padding: 32px;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
      animation: modalIn .3s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes modalIn { from { opacity:0; transform:translateY(20px) scale(.97); } to { opacity:1; transform:none; } }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }

    .modal-title { font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 800; }

    .modal-close {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 1.2rem; padding: 4px;
      line-height: 1; transition: color .2s;
    }
    .modal-close:hover { color: var(--text-primary); }

    /* ── Form ── */
    .form-group { margin-bottom: 18px; }

    .form-label {
      display: block;
      font-size: .79rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .05em;
      color: var(--text-secondary);
      margin-bottom: 7px;
      transition: color .2s;
    }
    .form-group:focus-within .form-label { color: var(--accent-blue); }

    .required { color: var(--accent-rose); margin-left: 2px; }

    .form-input, .form-textarea {
      width: 100%;
      padding: 11px 14px;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: .9rem;
      outline: none;
      transition: all .25s;
    }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--text-muted); }
    .form-input:focus, .form-textarea:focus {
      border-color: var(--border-focus);
      background: var(--bg-input-focus);
      box-shadow: 0 0 0 4px rgba(59,130,246,.12);
    }
    .form-textarea { resize: vertical; min-height: 110px; line-height: 1.6; }

    /* ── Priority pills (modal) ── */
    .priority-group { display: flex; gap: 8px; }
    .priority-pill {
      flex: 1; padding: 9px 4px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--border);
      background: var(--bg-input);
      color: var(--text-muted);
      font-family: 'Outfit', sans-serif; font-size: .85rem; font-weight: 700;
      text-align: center; cursor: pointer;
      transition: all .2s; user-select: none;
    }
    .priority-pill:hover   { border-color: rgba(255,255,255,.22); color: var(--text-primary); }
    .priority-pill.active.low    { background: rgba(100,116,139,.15); border-color: #64748b; color: #94a3b8; }
    .priority-pill.active.medium { background: rgba(245,158,11,.12);  border-color: var(--accent-amber); color: var(--accent-amber); }
    .priority-pill.active.high   { background: rgba(244,63,94,.12);   border-color: var(--accent-rose);  color: var(--accent-rose); }

    /* ── Submit row ── */
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; border-top: 1px solid var(--border); padding-top: 20px; }

    .btn-submit-modal {
      background: linear-gradient(135deg,var(--accent-blue),var(--accent-indigo));
      color: #fff;
      box-shadow: 0 2px 12px rgba(59,130,246,.3);
    }
    .btn-submit-modal:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(59,130,246,.4); }
    .btn-submit-modal:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    /* ── Success toast ── */
    .toast-container { position: fixed; bottom: 28px; right: 28px; z-index: 999; display: flex; flex-direction: column; gap: 10px; }

    .toast {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 18px;
      border-radius: var(--radius-md);
      font-size: .87rem; font-weight: 600;
      background: var(--bg-card);
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      animation: toastIn .3s ease both;
    }
    @keyframes toastIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:none; } }
    .toast-success { border-color: rgba(16,185,129,.4); color: var(--accent-emerald); }
    .toast-error   { border-color: rgba(244,63,94,.4);  color: var(--accent-rose); }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .page-body { padding: 16px; }
      .topbar { padding: 0 16px; }
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- ── Main ── -->
  <div class="main">

    <!-- Topbar -->
    <header class="topbar">
      <span class="topbar-title">Tickets</span>
      <span class="topbar-badge">
        <span class="material-icons-outlined">public</span>
        Public Portal
      </span>
    </header>

    <!-- Page body -->
    <div class="page-body">
      <div class="card">

        <!-- Card header -->
        <div class="card-header">
          <span class="card-title">Repair Tickets</span>
          <div class="card-actions">
            <select id="filter-status" class="form-input" style="width:auto;min-width:140px;cursor:pointer;">
              <option value="">All Statuses</option>
              <option value="pending">Pending</option>
              <option value="in_progress">In Progress</option>
              <option value="resolved">Resolved</option>
              <option value="cancelled">Cancelled</option>
            </select>
            <button class="btn btn-primary" id="open-modal-btn">
              <span class="material-icons-outlined">add</span> Create Ticket
            </button>
            <button class="btn btn-ghost" id="refresh-btn" title="Refresh">
              <span class="material-icons-outlined">refresh</span>
            </button>
          </div>
        </div>

        <!-- Loading -->
        <div class="spinner" id="loading"></div>

        <!-- Table -->
        <div class="table-wrap" id="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Customer</th>
                <th>Issue</th>
                <th>Priority</th>
                <th>Status</th>
                <th>Repaired By</th>
                <th>Proof</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>

        <!-- Empty state -->
        <div class="empty-state" id="empty-state" style="display:none;">
          <div class="empty-icon">
            <span class="material-icons-outlined" style="font-size:3rem;">build</span>
          </div>
          <div class="empty-title">No repair tickets found.</div>
          <div class="empty-sub">Be the first to submit a ticket using the button above.</div>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination">
          <span id="page-info">Page 1</span>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-ghost btn-sm" id="prev-btn" disabled>Previous</button>
            <button class="btn btn-ghost btn-sm" id="next-btn" disabled>Next</button>
          </div>
        </div>

      </div><!-- /card -->
    </div><!-- /page-body -->
  </div><!-- /main -->
</div><!-- /layout -->

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<!-- ── Create Ticket Modal ── -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Create Ticket</span>
      <button class="modal-close" id="close-modal-btn" aria-label="Close">✕</button>
    </div>

    <form id="ticket-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="f-name">Full Name <span class="required">*</span></label>
        <input type="text" class="form-input" id="f-name" placeholder="e.g. Juan dela Cruz" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="f-address">Address or Account ID</label>
        <input type="text" class="form-input" id="f-address" placeholder="e.g. Blk 3 Lot 5 Sampaguita St., or CUST-123456">
      </div>
      <div class="form-group">
        <label class="form-label" for="f-issue">Issue Description <span class="required">*</span></label>
        <textarea class="form-textarea" id="f-issue" placeholder="Describe your internet problem…" required></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Priority <span class="required">*</span></label>
        <div class="priority-group" id="priority-group">
          <div class="priority-pill low"           data-p="low"    tabindex="0">Low</div>
          <div class="priority-pill medium active" data-p="medium" tabindex="0">Medium</div>
          <div class="priority-pill high"          data-p="high"   tabindex="0">High</div>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" id="cancel-btn">Cancel</button>
        <button type="submit" class="btn btn-submit-modal" id="submit-btn">
          <span class="material-icons-outlined" style="font-size:17px;" id="submit-icon">send</span>
          <span id="submit-label">Save Ticket</span>
        </button>
      </div>
    </form>
  </div>
</div>

<script>
  /* ── Appwrite config ── */
  const ENDPOINT    = 'https://appwrite.springhive.co/v1';
  const PROJECT_ID  = '69c4840a0022d6824d83';
  const API_KEY     = 'standard_b650468f4a776eac08a7d0f31aea79b5de528e970e85714564a8d0480a9cffc6d0c947aaeaecc2a2011b98c97f90515cbf5f9e16d3cd6230d259d1e91d885a1de14d5c1cb20da10930d49bcc3f3cb7d3f4a5011619cba4e42d533abefbc60435de9ab782c82e59704a44ea08b88f9babd5a6edb83fb50e2bc6f4cb33e1069b6c';
  const DATABASE_ID = 'wifi_billing_db';
  const COLLECTION  = 'repair_tickets';

  const ITEMS_PER_PAGE = 10;
  let currentPage      = 1;
  let hasMore          = false;
  let selectedPriority = 'medium';
  let currentFilter    = '';

  /* ── Helpers ── */
  function formatDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('en-PH', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function statusBadge(s) {
    const map = {
      pending:     { cls: 'badge-pending',   label: 'Pending' },
      in_progress: { cls: 'badge-progress',  label: 'In Progress' },
      resolved:    { cls: 'badge-resolved',  label: 'Resolved' },
      cancelled:   { cls: 'badge-cancelled', label: 'Cancelled' },
    };
    const info = map[s] || { cls: '', label: s };
    return `<span class="badge ${info.cls}">${info.label}</span>`;
  }

  function priorityLabel(p) {
    const cls = { low: 'priority-low', medium: 'priority-medium', high: 'priority-high', critical: 'priority-critical' };
    const label = (p || 'medium');
    return `<span class="${cls[label] || 'priority-medium'}" style="text-transform:capitalize;">${label}</span>`;
  }

  /* ── Toast ── */
  function toast(msg, type = 'success') {
    const tc  = document.getElementById('toast-container');
    const el  = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.innerHTML = `<span class="material-icons-outlined" style="font-size:17px;">${type === 'success' ? 'check_circle' : 'error_outline'}</span>${msg}`;
    tc.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 3500);
  }

  /* ── Fetch tickets ── */
  async function loadTickets(page = 1) {
    const loading   = document.getElementById('loading');
    const tableWrap = document.getElementById('table-wrap');
    const emptyEl   = document.getElementById('empty-state');
    const tbody     = document.getElementById('tbody');

    loading.style.display  = 'block';
    tableWrap.style.display = 'none';
    emptyEl.style.display   = 'none';

    const offset = (page - 1) * ITEMS_PER_PAGE;
    const queries = [
      JSON.stringify({ method: 'orderDesc', values: ['$createdAt'] }),
      JSON.stringify({ method: 'limit', values: [ITEMS_PER_PAGE] }),
      JSON.stringify({ method: 'offset', values: [offset] }),
    ];
    if (currentFilter) queries.push(JSON.stringify({ method: 'equal', values: ['status', [currentFilter]] }));

    const params = new URLSearchParams();
    queries.forEach(q => params.append('queries[]', q));

    try {
      const res = await fetch(
        `${ENDPOINT}/databases/${DATABASE_ID}/collections/${COLLECTION}/documents?${params}`,
        { headers: { 'X-Appwrite-Project': PROJECT_ID, 'X-Appwrite-Key': API_KEY } }
      );
      if (!res.ok) throw new Error('Fetch failed');
      const data = await res.json();
      const docs = data.documents || [];

      currentPage = page;
      hasMore     = docs.length === ITEMS_PER_PAGE;

      loading.style.display = 'none';

      if (docs.length === 0) {
        emptyEl.style.display = 'block';
      } else {
        tableWrap.style.display = 'block';
        tbody.innerHTML = docs.map(t => `
          <tr>
            <td>${formatDate(t.$createdAt)}</td>
            <td>
              <div class="customer-name">${t.customerName || 'Unknown'}</div>
              <div class="customer-id">${t.customerId || ''}</div>
            </td>
            <td class="issue-cell" title="${t.issueDescription || t.issue || ''}">${t.issueDescription || t.issue || '—'}</td>
            <td>${priorityLabel(t.priority)}</td>
            <td>${statusBadge(t.status || 'pending')}</td>
            <td>${t.technicianName || '<span style="color:var(--text-muted);font-style:italic;">Unassigned</span>'}</td>
            <td>${
              (t.imageUrls && t.imageUrls.length > 0)
                ? `<a href="${t.imageUrls[t.imageUrls.length-1]}" target="_blank" style="color:var(--accent-blue);display:flex;align-items:center;gap:4px;font-size:.84rem;font-weight:600;"><span class="material-icons-outlined" style="font-size:16px;">image</span> View</a>`
                : '<span style="color:var(--text-muted);">—</span>'
            }</td>
          </tr>
        `).join('');
      }

      // Pagination
      document.getElementById('page-info').textContent = `Page ${currentPage}`;
      document.getElementById('prev-btn').disabled = currentPage === 1;
      document.getElementById('next-btn').disabled = !hasMore;

    } catch (err) {
      loading.style.display = 'none';
      emptyEl.style.display = 'block';
      console.error(err);
    }
  }

  /* ── Priority pills ── */
  document.querySelectorAll('.priority-pill').forEach(pill => {
    const activate = () => {
      document.querySelectorAll('.priority-pill').forEach(p => { p.classList.remove('active'); });
      pill.classList.add('active');
      selectedPriority = pill.dataset.p;
    };
    pill.addEventListener('click', activate);
    pill.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); activate(); } });
  });

  /* ── Modal ── */
  function openModal() { document.getElementById('modal-overlay').classList.add('open'); }
  function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

  document.getElementById('open-modal-btn').addEventListener('click', openModal);
  document.getElementById('close-modal-btn').addEventListener('click', closeModal);
  document.getElementById('cancel-btn').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === document.getElementById('modal-overlay')) closeModal(); });

  /* ── Submit ── */
  document.getElementById('ticket-form').addEventListener('submit', async e => {
    e.preventDefault();

    const name  = document.getElementById('f-name').value.trim();
    const addr  = document.getElementById('f-address').value.trim();
    const issue = document.getElementById('f-issue').value.trim();

    if (!name)  { toast('Please enter your full name.', 'error'); return; }
    if (!issue) { toast('Please describe the issue.', 'error'); return; }

    const btn   = document.getElementById('submit-btn');
    const icon  = document.getElementById('submit-icon');
    const label = document.getElementById('submit-label');

    btn.disabled   = true;
    icon.textContent = 'hourglass_top';
    label.textContent = 'Saving…';

    const payload = {
      documentId: 'unique()',
      data: {
        customerName:     name,
        customerId:       addr || 'Walk-in',
        customerAddress:  addr || '',
        issue:            issue,
        issueDescription: issue,
        priority:         selectedPriority,
        status:           'pending',
        technicianId:     '',
        technicianName:   '',
        notes:            '',
      },
      permissions: ['read("any")', 'update("any")', 'delete("any")']
    };

    try {
      const res = await fetch(
        `${ENDPOINT}/databases/${DATABASE_ID}/collections/${COLLECTION}/documents`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Appwrite-Project': PROJECT_ID, 'X-Appwrite-Key': API_KEY },
          body: JSON.stringify(payload)
        }
      );
      if (!res.ok) throw new Error('Submit failed');

      closeModal();
      document.getElementById('ticket-form').reset();
      // reset priority pill
      document.querySelectorAll('.priority-pill').forEach(p => p.classList.remove('active'));
      document.querySelector('[data-p="medium"]').classList.add('active');
      selectedPriority = 'medium';

      toast('Ticket submitted successfully!');
      loadTickets(1);

    } catch (err) {
      toast('Failed to submit ticket. Try again.', 'error');
    } finally {
      btn.disabled       = false;
      icon.textContent   = 'send';
      label.textContent  = 'Save Ticket';
    }
  });

  /* ── Filter & controls ── */
  document.getElementById('filter-status').addEventListener('change', e => {
    currentFilter = e.target.value;
    loadTickets(1);
  });

  document.getElementById('refresh-btn').addEventListener('click', () => loadTickets(currentPage));
  document.getElementById('prev-btn').addEventListener('click', () => { if (currentPage > 1) loadTickets(currentPage - 1); });
  document.getElementById('next-btn').addEventListener('click', () => { if (hasMore) loadTickets(currentPage + 1); });

  /* ── Boot ── */
  loadTickets(1);
</script>
</body>
</html>
