<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WiFi Billing — Connected World</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined">
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg-base: #031518;
      --card-bg: #061c21;
      --teal-light: #16b49e;
      --teal-dark: #094741;
      --text-main: #ffffff;
      --text-muted: #9dbbbb;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-base);
      color: var(--text-main);
      overflow: hidden;
      height: 100vh;
    }

    /* Background Setup */
    .bg-layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100vh;
      z-index: -1;
      overflow: hidden;
      background: radial-gradient(circle at top right, #0a403a 0%, var(--bg-base) 70%);
    }

    /* SVG Waves */
    .svg-waves {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0.8;
      pointer-events: none;
    }

    .dotted-texture {
      position: absolute;
      top: 0; right: 0; width: 60%; height: 800px;
      background-image: radial-gradient(rgba(26, 188, 156, 0.4) 1px, transparent 1px);
      background-size: 15px 15px;
      mask-image: radial-gradient(ellipse at center right, black 0%, transparent 60%);
      -webkit-mask-image: radial-gradient(ellipse at center right, black 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Particles Canvas explicitly restricted to the red box */
    #particle-canvas {
      position: absolute;
      top: 100px; right: 5%;
      width: 55%; height: 380px;
      pointer-events: none;
      opacity: 0.9;
      z-index: 1;
    }

    /* Container */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 40px;
      position: relative;
    }

    /* Navbar */
    .navbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 30px 0; position: relative; z-index: 10;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      color: white; text-decoration: none;
      font-family: 'Outfit', sans-serif; font-size: 1.6rem; font-weight: 700;
    }
    .brand-icon {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
    }
    
    .wifi-animated { position: relative; width: 32px; height: 32px; }
    .wifi-arc {
      position: absolute; left: 50%; transform: translateX(-50%);
      border: 3px solid transparent; border-top-color: white; border-radius: 50%;
      opacity: 0; animation: wifi-fade 1.5s infinite;
    }
    .wifi-arc1 { width: 32px; height: 32px; top: 2px; animation-delay: 0s; }
    .wifi-arc2 { width: 22px; height: 22px; top: 7px; animation-delay: 0.3s; }
    .wifi-arc3 { width: 12px; height: 12px; top: 12px; animation-delay: 0.6s; }
    .wifi-dot {
      position: absolute; width: 6px; height: 6px; background: white;
      border-radius: 50%; left: 50%; transform: translateX(-50%); top: 17px;
    }
    @keyframes wifi-fade { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
    
    .nav-links { display: flex; gap: 30px; align-items: center; }
    .nav-links a { color: var(--text-main); text-decoration: none; font-size: 0.95rem; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover { color: var(--teal-light); }
    a.btn-login { background: white; color: #04161a; padding: 10px 24px; border-radius: 8px; font-weight: 700; margin-left: 10px; transition: transform 0.2s; }
    a.btn-login:hover { color: #04161a; transform: translateY(-2px); }

    /* Hero */
    .hero {
      padding: 80px 0;
      max-width: 500px;
      position: relative;
      z-index: 10;
    }
    .hero h1 { font-family: 'Outfit', sans-serif; font-size: 4.2rem; font-weight: 700; line-height: 1.1; margin-bottom: 24px; }
    .hero p { font-size: 1.2rem; color: var(--text-muted); margin-bottom: 40px; line-height: 1.5; }
    .btn-start { display: inline-block; background: white; color: var(--bg-base); padding: 14px 32px; border-radius: 8px; font-weight: 700; font-size: 1.1rem; text-decoration: none; }

    /* Layout Split */
    .layout-grid {
      display: flex;
      gap: 60px;
      align-items: flex-start;
      margin-top: 40px;
      padding-bottom: 100px;
    }

    /* Left Side Elements (Grid of cards fading into bg) */
    .left-col {
      flex: 1;
      padding-top: 60px;
    }
    
    .left-header { margin-bottom: 30px; }
    .sub-green { color: var(--teal-light); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 10px; }
    .title-white { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 600; margin-bottom: 15px; }
    .desc-light { font-size: 1.1rem; color: var(--text-muted); line-height: 1.5; }

    .bg-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
    }
    
    .bg-card {
      background: white; border-radius: 16px; padding: 24px 16px; text-align: center; color: #111;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
    
    /* Right Floating Card */
    .right-col {
      width: 100%;
      max-width: 800px;
      margin-left: auto;
      background: var(--card-bg);
      border-radius: 24px;
      padding: 60px 50px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.03);
      position: relative;
      z-index: 20;
      margin-top: -80px; /* Overlaps upwards */
    }

    /* Inside Dark Card */
    .card-center-text { text-align: center; margin-bottom: 50px; }
    
    .carousel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .t-title { font-family: 'Outfit', sans-serif; font-size: 1.4rem; }
    .t-nav { display: flex; gap: 8px; }
    .t-btn { width: 30px; height: 30px; background: rgba(255,255,255,0.05); border: none; border-radius: 6px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    
    .carousel { display: flex; gap: 16px; overflow-x: auto; scrollbar-width: none; padding-bottom: 10px; margin-bottom: 60px; }
    .carousel::-webkit-scrollbar { display: none; }

    .t-card { background: white; border-radius: 16px; padding: 24px 16px; min-width: 170px; text-align: center; color: #111; flex-shrink: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
    .avatar { width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 32px; }
    .t-name { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
    .t-role { font-size: 0.75rem; color: #666; font-weight: 600; text-transform: uppercase; margin-bottom: 10px; }
    .t-desc { font-size: 0.75rem; color: #777; line-height: 1.4; }

    /* Features Grid */
    .f-section { text-align: center; margin-top: 30px; }
    .f-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 40px; }
    .f-item { text-align: center; }
    .f-icon { color: var(--teal-light); font-size: 42px; margin-bottom: 16px; }
    .f-name { font-weight: 600; font-size: 1rem; margin-bottom: 6px; }
    .f-desc { font-size: 0.75rem; color: var(--text-muted); line-height: 1.4; }

    /* Footer */
    .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 80px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 0.75rem; color: var(--text-muted); }
    .socials { display: flex; gap: 16px; color: white; }
    .socials span { font-size: 18px; cursor: pointer; }
  </style>
</head>
<body>

  <!-- Backgrounds -->
  <div class="bg-layer">
    <svg class="svg-waves" viewBox="0 0 1440 800" preserveAspectRatio="none">
      <path fill="#083a35" d="M0,400 C300,600 600,200 1440,300 L1440,0 L0,0 Z"></path>
      <path fill="#0c5a50" fill-opacity="0.6" d="M0,500 C400,600 700,100 1440,400 L1440,0 L0,0 Z"></path>
      <path fill="#118070" fill-opacity="0.3" d="M0,600 C500,700 800,200 1440,500 L1440,0 L0,0 Z"></path>
    </svg>
    <div class="dotted-texture"></div>
    <canvas id="particle-canvas"></canvas>
  </div>

  <div class="container">
    <!-- Navbar -->
    <nav class="navbar">
      <a href="#" class="brand">
        <div class="brand-icon">
          <div class="wifi-animated">
            <div class="wifi-arc wifi-arc1"></div>
            <div class="wifi-arc wifi-arc2"></div>
            <div class="wifi-arc wifi-arc3"></div>
            <div class="wifi-dot"></div>
          </div>
        </div>
        WiFi Billing
      </a>
      <div class="nav-links">
        <a href="/report/">Support</a>
        <a href="/" class="btn-login">Login</a>
      </div>
    </nav>

    <!-- Hero -->
    <header class="hero">
      <h1>Connecting<br>Communities</h1>
      <p>Reliable WiFi billing solutions for a connected world.</p>
      <a href="/report/" class="btn-start">Get Started Now</a>
    </header>


  </div>

  <script>
    // Particle Canvas Animation
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    
    // Track global mouse position
    let mouse = {
      x: null,
      y: null,
      radius: 180 // Connection distance from mouse
    };

    window.addEventListener('mousemove', function(event) {
      // Get mouse position relative to canvas
      const rect = canvas.getBoundingClientRect();
      mouse.x = event.clientX - rect.left;
      mouse.y = event.clientY - rect.top;
    });

    window.addEventListener('mouseout', function() {
      mouse.x = null;
      mouse.y = null;
    });
    
    function resize() {
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
    }
    
    class Node {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4;
        this.radius = Math.random() * 3 + 1.5;
      }
      update() {
        this.x += this.vx; this.y += this.vy;
        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
        ctx.fillStyle = '#2dd4bf'; 
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#2dd4bf';
        ctx.fill();
        ctx.shadowBlur = 0; 
      }
    }

    function init() {
      resize();
      particles = [];
      const numParticles = Math.min((canvas.width * canvas.height) / 10000, 80);
      for(let i=0; i<numParticles; i++) particles.push(new Node());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for(let i=0; i<particles.length; i++) {
        particles[i].update();
        particles[i].draw();
        
        // Check connection to mouse
        if (mouse.x != null && mouse.y != null) {
          let dx = particles[i].x - mouse.x;
          let dy = particles[i].y - mouse.y;
          let dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < mouse.radius) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(45, 212, 191, ${(1 - dist/mouse.radius) * 1})`;
            ctx.lineWidth = 1.5;
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(mouse.x, mouse.y);
            ctx.stroke();
          }
        }

        // Check connection to other particles
        for(let j=i+1; j<particles.length; j++) {
          let dx = particles[i].x - particles[j].x;
          let dy = particles[i].y - particles[j].y;
          let dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 150) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(45, 212, 191, ${(1 - dist/150) * 0.8})`;
            ctx.lineWidth = 1;
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => { resize(); init(); });
    init();
    animate();
  </script>
</body>
</html>
