<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Animations Demo</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <style>
    body {
      background: #0f172a; color: white; font-family: 'Outfit', sans-serif;
      margin: 0; padding: 40px;
    }
    h1 { text-align: center; margin-bottom: 40px; }
    .grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px;
    }
    .demo-card {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      padding: 24px; position: relative; overflow: hidden; height: 300px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .demo-title {
      position: absolute; top: 12px; left: 12px; font-size: 0.9rem; color: #94a3b8; font-weight: bold; z-index: 100;
    }

    /* 1. Satellite Waves */
    .satellite-demo { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .dish-icon { font-size: 48px; color: #94a3b8; position: relative; z-index: 10; }
    .satellite-waves {
      position: absolute; width: 60px; height: 60px; border-radius: 50%;
      border: 2px solid rgba(79, 70, 229, 0.8); animation: pulse-wave 2s infinite ease-out;
    }
    @keyframes pulse-wave { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }

    /* 2. Glowing Nodes */
    .node-demo { position: relative; width: 100%; height: 100%; background: #0f172a; }
    .network-node {
      position: absolute; width: 10px; height: 10px; background: #00d9ff; border-radius: 50%;
      box-shadow: 0 0 10px #00d9ff, 0 0 20px #00d9ff; animation: node-flicker 2s infinite alternate;
    }
    @keyframes node-flicker { 0% { opacity: 0.2; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.5); } }

    /* 4. Connecting Beam */
    .beam-demo { position: relative; width: 100%; height: 100%; display: flex; align-items: center; }
    .beam-start { width: 20px; height: 20px; background: #4f46e5; border-radius: 50%; }
    .beam-end { width: 20px; height: 20px; background: #334155; border-radius: 50%; margin-left: auto; }
    .connecting-beam {
      position: absolute; left: 20px; width: 100px; height: 3px;
      background: linear-gradient(90deg, transparent, #00d9ff, transparent);
      animation: shoot-beam 3s infinite;
    }
    @keyframes shoot-beam { 0% { transform: translateX(0); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateX(200px); opacity: 0; } }

    /* 5. Staggered Entrance */
    .stagger-demo { display: flex; flex-direction: column; gap: 10px; width: 80%; }
    .stagger-item { background: #334155; height: 40px; border-radius: 6px; opacity: 0; animation: slideUp 0.5s ease forwards; }
    .stagger-item:nth-child(1) { animation-delay: 0.2s; }
    .stagger-item:nth-child(2) { animation-delay: 0.4s; }
    .stagger-item:nth-child(3) { animation-delay: 0.6s; background: #4f46e5; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* 6. Neon Focus */
    .neon-input {
      background: #0f172a; border: 2px solid #334155; color: white; padding: 12px; border-radius: 8px; width: 80%;
      transition: all 0.3s ease; outline: none;
    }
    .neon-input:focus { border-color: #4f46e5; box-shadow: 0 0 15px rgba(79, 70, 229, 0.5); }

    /* 7. Button Shine */
    .shine-btn {
      background: #4f46e5; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold;
      position: relative; overflow: hidden; cursor: pointer; width: 80%;
    }
    .shine-btn::after {
      content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
      transform: rotate(45deg) translateX(-100%); transition: transform 0.6s ease;
    }
    .shine-btn:hover::after { transform: rotate(45deg) translateX(100%); }

    /* 8. Typing Placeholder */
    .type-input {
      background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; width: 80%;
    }

  </style>
</head>
<body>

  <h1>Login Animations Demo</h1>
  
  <div class="grid">
    <!-- Demo 1 -->
    <div class="demo-card">
      <div class="demo-title">1. Satellite Waves</div>
      <div class="satellite-demo">
        <span class="material-icons-outlined dish-icon">satellite_alt</span>
        <div class="satellite-waves"></div>
      </div>
    </div>

    <!-- Demo 2 -->
    <div class="demo-card">
      <div class="demo-title">2. Glowing Network Nodes</div>
      <div class="node-demo">
        <div class="network-node" style="top: 30%; left: 20%;"></div>
        <div class="network-node" style="top: 70%; left: 80%; animation-delay: 0.5s;"></div>
        <div class="network-node" style="top: 50%; left: 50%; animation-delay: 1s;"></div>
      </div>
    </div>

    <!-- Demo 4 -->
    <div class="demo-card">
      <div class="demo-title">4. Connecting Beam</div>
      <div class="beam-demo">
        <div class="beam-start"></div>
        <div class="connecting-beam"></div>
        <div class="beam-end"></div>
      </div>
    </div>

    <!-- Demo 5 -->
    <div class="demo-card">
      <div class="demo-title">5. Staggered Entrance (Hover to replay)</div>
      <div class="stagger-demo" id="stagger-box">
        <div class="stagger-item"></div>
        <div class="stagger-item"></div>
        <div class="stagger-item"></div>
      </div>
    </div>

    <!-- Demo 6 -->
    <div class="demo-card">
      <div class="demo-title">6. Neon Focus Glow</div>
      <input type="text" class="neon-input" placeholder="Click to focus me...">
    </div>

    <!-- Demo 7 -->
    <div class="demo-card">
      <div class="demo-title">7. Button Hover Shine</div>
      <button class="shine-btn">Hover Me</button>
    </div>

    <!-- Demo 8 -->
    <div class="demo-card">
      <div class="demo-title">8. Animated Typing</div>
      <input type="text" class="type-input" id="type-demo" placeholder="">
    </div>
  </div>

  <script>
    // Typing Demo
    const typeInput = document.getElementById('type-demo');
    const text = "admin@wifibilling.com";
    let i = 0;
    function typePlaceholder() {
      if (i < text.length) {
        typeInput.setAttribute('placeholder', text.substring(0, i+1));
        i++;
        setTimeout(typePlaceholder, 150);
      } else {
        setTimeout(() => { i = 0; typeInput.setAttribute('placeholder', ''); typePlaceholder(); }, 2000);
      }
    }
    setTimeout(typePlaceholder, 1000);

    // Replay Stagger
    const staggerBox = document.getElementById('stagger-box');
    staggerBox.parentElement.addEventListener('mouseenter', () => {
      staggerBox.innerHTML = '';
      setTimeout(() => {
        staggerBox.innerHTML = '<div class="stagger-item"></div><div class="stagger-item"></div><div class="stagger-item"></div>';
      }, 50);
    });
  </script>
</body>
</html>
